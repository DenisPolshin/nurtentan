server {
  server_name nurtentan.de www.nurtentan.de;

  client_max_body_size 20m;

  location / {
    proxy_pass http://127.0.0.1:3005;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  ssl_certificate /etc/letsencrypt/live/nurtentan.de/fullchain.pem; # managed by Certbot
  ssl_certificate_key /etc/letsencrypt/live/nurtentan.de/privkey.pem; # managed by Certbot
  include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

  listen 443 ssl; # managed by Certbot
}

server {
  listen 80;
  server_name nurtentan.de www.nurtentan.de;
  return 301 https://$host$request_uri;
}
