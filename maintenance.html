<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wartungsarbeiten | DeutschLernen</title>
    <style>
        :root {
            --green-500: #22c55e;
            --green-600: #16a34a;
            --slate-50: #f8fafc;
            --slate-100: #f1f5f9;
            --slate-500: #64748b;
            --slate-800: #1e293b;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--slate-50);
            color: var(--slate-800);
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 1.5rem;
            overflow: hidden;
        }
        .container {
            background-color: white;
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            max-width: 28rem;
            width: 100%;
            border: 2px solid var(--slate-100);
            animation: slideUp 0.5s ease-out;
        }
        .logo-container {
            width: 4rem;
            height: 4rem;
            background-color: var(--green-500);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 4px 14px 0 rgba(34, 197, 94, 0.39);
        }
        .logo-container span {
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        h1 {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            color: var(--slate-800);
            letter-spacing: -0.025em;
        }
        p {
            color: var(--slate-500);
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .spinner {
            display: inline-block;
            width: 2.5rem;
            height: 2.5rem;
            border: 4px solid var(--slate-100);
            border-top-color: var(--green-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        .time-badge {
            display: inline-flex;
            align-items: center;
            background-color: #f0fdf4;
            color: var(--green-600);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 0.875rem;
            border: 1px solid #bbf7d0;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Pulse effect for auto-reload text */
        .reload-text {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: var(--slate-500);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <span>D</span>
        </div>
        
        <div class="spinner"></div>
        
        <h1>Wir aktualisieren die Seite</h1>
        
        <p>Wir spielen gerade ein wichtiges Update ein, um dein Lernerlebnis noch besser zu machen. Bitte habe einen Moment Geduld.</p>
        
        <div class="time-badge">
            <svg style="width: 1rem; height: 1rem; margin-right: 0.375rem;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            Dauert ca. 5 Minuten
        </div>
    </div>
    
    <div class="reload-text">
        Diese Seite lädt sich automatisch neu...
    </div>

    <script>
        // Check every 10 seconds if the site is back online
        setInterval(() => {
            fetch(window.location.href, { method: 'HEAD', cache: 'no-store' })
                .then(response => {
                    // If we don't get a 503, it means maintenance mode is over
                    if (response.status !== 503) {
                        window.location.reload();
                    }
                })
                .catch(() => {
                    // Ignore network errors (site might be completely down momentarily)
                });
        }, 10000);
    </script>
</body>
</html>
